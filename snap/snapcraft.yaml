name: claude-manager
base: core22
version: "SNAP_VERSION"
summary: Claude Code session manager
description: |
  ClaudeManager is a desktop app for managing multiple Claude Code sessions.
  Organize sessions into groups, view them side by side in a grid layout,
  and track activity across all your projects.

grade: stable
confinement: strict

apps:
  claude-manager:
    command: usr/bin/claude-manager
    desktop: usr/share/applications/ClaudeManager.desktop
    extensions: [gnome]
    plugs:
      - home
      - network
      - browser-support
      - audio-playback
      - opengl
    environment:
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"

parts:
  claude-manager:
    plugin: dump
    source: https://github.com/JeffreyWardman/claude-manager/releases/download/vSNAP_VERSION/ClaudeManager_SNAP_VERSION_amd64.deb
    source-type: deb
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
