name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install commitizen

      - id: bump
        run: |
          if cz bump --dry-run 2>/dev/null; then
            cz bump --yes
            VERSION=$(cz version --project)
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.bump.outputs.bumped == 'true'
        run: |
          # Cargo.lock needs regenerating after Cargo.toml version bump
          cd src-tauri && cargo update --workspace && cd ..

      - if: steps.bump.outputs.bumped == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bumped-source
          path: |
            .cz.toml
            CHANGELOG.md
            package.json
            src-tauri/Cargo.toml
            src-tauri/Cargo.lock
            src-tauri/tauri.conf.json

  build:
    needs: bump
    if: needs.bump.outputs.bumped == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bumped-source

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bunx tauri build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: ${{ matrix.bundle_paths }}

  release:
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: bumped-source

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "bump: v${{ needs.bump.outputs.version }}"
          git tag "v${{ needs.bump.outputs.version }}"
          git push origin main --follow-tags

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
