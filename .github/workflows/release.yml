name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      version: ${{ steps.bump.outputs.version }}
      pre_bumped: ${{ steps.bump.outputs.pre_bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install commitizen

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - id: bump
        run: |
          CURRENT=$(python3 -c "
          import tomllib
          with open('.cz.toml', 'rb') as f:
              print(tomllib.load(f)['tool']['commitizen']['version'])
          ")
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          LATEST_VERSION=${LATEST_TAG#v}

          if [ -z "$LATEST_TAG" ]; then
            # First release — no existing tags
            if [ "$CURRENT" != "0.0.0" ]; then
              echo "First release: $CURRENT (pre-bumped, no existing tags)"
              echo "bumped=true" >> "$GITHUB_OUTPUT"
              echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
              echo "pre_bumped=true" >> "$GITHUB_OUTPUT"
            else
              cz bump --yes --increment MINOR
              VERSION=$(cz version --project)
              echo "First release: $VERSION"
              echo "bumped=true" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "pre_bumped=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$CURRENT" != "$LATEST_VERSION" ]; then
            echo "Version already bumped to $CURRENT (latest tag: $LATEST_TAG)"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "pre_bumped=true" >> "$GITHUB_OUTPUT"
          elif cz bump --yes --dry-run 2>/dev/null; then
            cz bump --yes
            VERSION=$(cz version --project)
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "pre_bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "No version bump needed"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.bump.outputs.bumped == 'true'
        run: |
          cd src-tauri && cargo update --workspace && cd ..

      - if: steps.bump.outputs.bumped == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bumped-source
          path: |
            .cz.toml
            CHANGELOG.md
            package.json
            src-tauri/Cargo.toml
            src-tauri/Cargo.lock
            src-tauri/tauri.conf.json
            src/components/Settings.tsx

  build:
    needs: bump
    if: needs.bump.outputs.bumped == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bumped-source

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bunx tauri build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: ${{ matrix.bundle_paths }}

  release:
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: bumped-source

      - name: Commit version bump and tag
        if: needs.bump.outputs.pre_bumped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "bump: v${{ needs.bump.outputs.version }}"
          git tag "v${{ needs.bump.outputs.version }}"
          git push origin HEAD --follow-tags

      - name: Tag pre-bumped version
        if: needs.bump.outputs.pre_bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.bump.outputs.version }}"
          git push origin "v${{ needs.bump.outputs.version }}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*

      - name: Update Homebrew cask
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.bump.outputs.version }}"
          ARM64_DMG=$(find artifacts -name "*_${VERSION}_aarch64.dmg" | head -1)
          X64_DMG=$(find artifacts -name "*_${VERSION}_x64.dmg" | head -1)
          if [ -n "$ARM64_DMG" ] && [ -n "$X64_DMG" ]; then
            ARM64_SHA=$(sha256sum "$ARM64_DMG" | awk '{print $1}')
            X64_SHA=$(sha256sum "$X64_DMG" | awk '{print $1}')
            git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/JeffreyWardman/homebrew-tap.git /tmp/homebrew-tap
            cd /tmp/homebrew-tap
            VERSION="$VERSION" ARM64_SHA="$ARM64_SHA" X64_SHA="$X64_SHA" \
              sed -i \
                -e "s/version \".*\"/version \"${VERSION}\"/" \
                casks/claude-manager.rb
            awk -v arm="$ARM64_SHA" -v x64="$X64_SHA" '
              /sha256/ && !done_arm { sub(/sha256 ".*"/, "sha256 \"" arm "\""); done_arm=1; next }
              /sha256/ && done_arm && !done_x64 { sub(/sha256 ".*"/, "sha256 \"" x64 "\""); done_x64=1 }
              { print }
            ' casks/claude-manager.rb > casks/claude-manager.rb.tmp && mv casks/claude-manager.rb.tmp casks/claude-manager.rb
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Update claude-manager to v${VERSION}" || true
            git push || true
          fi
